 > foreignObject > section[data-marpit-advanced-background="content"]::before, div#\:\$p > svg > foreignObject > section[data-marpit-advanced-background="content"]::after{display:none!important}div#\:\$p > svg > foreignObject > section[data-marpit-advanced-background="background"] > div[data-marpit-advanced-background-container]{all:initial;display:flex;flex-direction:row;height:100%;overflow:hidden;width:100%}div#\:\$p > svg > foreignObject > section[data-marpit-advanced-background="background"] > div[data-marpit-advanced-background-container][data-marpit-advanced-background-direction="vertical"]{flex-direction:column}div#\:\$p > svg > foreignObject > section[data-marpit-advanced-background="background"][data-marpit-advanced-background-split] > div[data-marpit-advanced-background-container]{width:var(--marpit-advanced-background-split, 50%)}div#\:\$p > svg > foreignObject > section[data-marpit-advanced-background="background"][data-marpit-advanced-background-split="right"] > div[data-marpit-advanced-background-container]{margin-left:calc(100% - var(--marpit-advanced-background-split, 50%))}div#\:\$p > svg > foreignObject > section[data-marpit-advanced-background="background"] > div[data-marpit-advanced-background-container] > figure{all:initial;background-position:center;background-repeat:no-repeat;background-size:cover;flex:auto;margin:0}div#\:\$p > svg > foreignObject > section[data-marpit-advanced-background="background"] > div[data-marpit-advanced-background-container] > figure > figcaption{position:absolute;border:0;clip:rect(0, 0, 0, 0);height:1px;margin:-1px;overflow:hidden;padding:0;white-space:nowrap;width:1px}div#\:\$p > svg > foreignObject > section[data-marpit-advanced-background="content"], div#\:\$p > svg > foreignObject > section[data-marpit-advanced-background="pseudo"]{background:transparent!important}div#\:\$p > svg > foreignObject > section[data-marpit-advanced-background="pseudo"], div#\:\$p > svg[data-marpit-svg] > foreignObject[data-marpit-advanced-background="pseudo"]{pointer-events:none!important}div#\:\$p > svg > foreignObject > section[data-marpit-advanced-background-split]{width:100%;height:100%}

<h1 id="python-string">Python String</h1>
<h4 id="2026-%E8%B3%87%E8%A8%8A%E4%B9%8B%E8%8A%BD-python-%E8%AA%9E%E6%B3%95%E7%8F%AD-string-%E7%B0%A1%E5%A0%B1">2026 資訊之芽 Python 語法班 String 簡報</h4>
<p>2026 Mar. 08 講師 藍少君</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="2" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="2" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="44">
<h1 id="outline">Outline</h1>
<ol>
<li>字串簡介</li>
<li>字串詳細</li>
<li>字串使用</li>
</ol>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="3" data-paginate="true" data-class="lead" data-theme="custom-academic" lang="en-US" class="lead" data-marpit-pagination="3" style="--paginate:true;--class:lead;--theme:custom-academic;" data-marpit-pagination-total="44">
<h1 id="%E5%AD%97%E4%B8%B2%E7%B0%A1%E4%BB%8B">字串簡介</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="4" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="4" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="44">
<h1 id="%E4%BB%80%E9%BA%BC%E6%98%AF%E5%AD%97%E4%B8%B2string">什麼是字串(string)</h1>
<ul>
<li>和整數(int)、浮點數(float)一樣，是 Python 的一種內建<strong>資料類別</strong>。</li>
<li>用來在程式內表示<strong>一串文字</strong>。</li>
<li>這裡的 <code>&quot;Hello, World&quot;</code> 就是一個字串。</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;Hello, World&quot;</span>)
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="5" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="44">
<h1 id="%E5%A6%82%E4%BD%95%E8%A1%A8%E7%A4%BA%E5%AD%97%E4%B8%B2">如何表示字串</h1>
<p>用 <strong>單引號(<code>' '</code>)</strong> 或 <strong>雙引號(<code>&quot; &quot;</code>)</strong> 夾注文字。</p>
<p>合法的字串:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">str1 = <span class="hljs-string">&quot;a valid string&quot;</span>
str2 = <span class="hljs-string">&#x27;a valid string&#x27;</span>
str3 = <span class="hljs-string">&quot;s&quot;</span> <span class="hljs-comment"># a string with a single character</span>
str4 = <span class="hljs-string">&#x27; &#x27;</span> <span class="hljs-comment"># a string with one &quot;space&quot; character</span>
str5 = <span class="hljs-string">&quot;&quot;</span>  <span class="hljs-comment"># an empty string</span>
</code></pre>
<blockquote>
<p>在程式內直接寫出字串的內容，這樣的字串表示被稱為 string literal。</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="6" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="44">
<h1 id="%E9%9A%A8%E4%BE%BF%E7%8E%A9%E7%8E%A9%E5%AD%97%E4%B8%B2">隨便玩玩字串</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">h = <span class="hljs-string">&quot;Hello&quot;</span>
w = <span class="hljs-string">&quot;World&quot;</span>
hw = h + <span class="hljs-string">&quot;, &quot;</span> + w <span class="hljs-comment"># 字串串接</span>
<span class="hljs-built_in">print</span>(hw) <span class="hljs-comment"># Hello, World</span>
</code></pre>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">hw = <span class="hljs-string">&quot;Hello World&quot;</span>
h, w = hw.split() <span class="hljs-comment"># 用空白分割</span>
<span class="hljs-built_in">print</span>(h) <span class="hljs-comment"># Hello</span>
<span class="hljs-built_in">print</span>(w) <span class="hljs-comment"># World</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="7" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="44">
<h1 id="%E9%9A%A8%E4%BE%BF%E7%8E%A9%E7%8E%A9%E5%AD%97%E4%B8%B2-1">隨便玩玩字串</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># 如果輸入 1</span>
number_str = <span class="hljs-built_in">input</span>() <span class="hljs-comment"># number_str = &quot;1&quot;</span>
number = <span class="hljs-built_in">int</span>(number_str) <span class="hljs-comment"># number = 1</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" data-paginate="true" data-class="lead" data-theme="custom-academic" lang="en-US" class="lead" data-marpit-pagination="8" style="--paginate:true;--class:lead;--theme:custom-academic;" data-marpit-pagination-total="44">
<h1 id="%E5%AD%97%E4%B8%B2%E8%A9%B3%E7%B4%B0">字串詳細</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="9" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="44">
<h1 id="%E5%AD%97%E5%85%83-vs-%E5%AD%97%E4%B8%B2">字元 vs. 字串</h1>
<ul>
<li><strong>字元(character)</strong>。</li>
<li><strong>字元</strong>是電腦處理文字的單位，可能是<strong>一個字母、符號</strong>，如: <code>'a'</code>、<code>'1'</code>、<code>' '</code>(空白)、<code>','</code>(逗號) 等。</li>
<li><strong>字串</strong>可看作連續<strong>多個字元組成的序列</strong>，如: <code>&quot;OuO&quot;</code> 可以想像成是 <code>['O', 'u', 'O']</code>，三個字元的序列。</li>
<li>在某些程式語言 (如: C、C++、Rust、...) 中，可以定義字元與字串兩種不同型別的變數，常以單引號表示字元，雙引號表示字串。</li>
<li><strong>Python 中並沒有字元的型別，只有長度為 1 的字串</strong>。</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="10" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="44">
<h1 id="%E8%B7%B3%E8%84%AB%E5%AD%97%E5%85%83">跳脫字元</h1>
<ul>
<li>在寫程式時，常會因某些限制，造成無法輸入想要的字元。</li>
<li>使用 <strong>反斜線(\)</strong> 加一些字，來代表原本要輸入的字元。</li>
</ul>
<p>想要表示<strong>換行字元</strong> =&gt; 輸入 <code>\n</code>。 (常見)</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">str1 = <span class="hljs-string">&quot;abc\n123&quot;</span>
<span class="hljs-built_in">print</span>(str1)
<span class="hljs-comment"># abc</span>
<span class="hljs-comment"># 123</span>
</code></pre>
<blockquote>
<p>Fun Fact: <code>print()</code> 預設會在輸出完字串後，補一個換行字元 <code>'\n'</code>。</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="11" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="44">
<h1 id="%E6%9B%B4%E5%A4%9A%E8%B7%B3%E8%84%AB%E5%AD%97%E5%85%83">更多跳脫字元</h1>
<p>想要在單(雙)引號字串中表示<strong>單(雙)引號</strong> =&gt; 輸入 <code>\'</code>(<code>\&quot;</code>)。</p>
<p>錯誤寫法:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">str1 = <span class="hljs-string">&quot;He said &quot;</span>Hello<span class="hljs-string">&quot; to me.&quot;</span>
</code></pre>
<p>正確寫法:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">str1 = <span class="hljs-string">&quot;He said \&quot;Hello\&quot; to me.&quot;</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="12" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="44">
<h1 id="%E6%9B%B4%E5%A4%9A%E8%B7%B3%E8%84%AB%E5%AD%97%E5%85%83-1">更多跳脫字元</h1>
<p>想要表示<strong>反斜線</strong> =&gt; 輸入 <code>\\</code>。</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">str1 = <span class="hljs-string">&quot;I&#x27;m not going to make a \new line.&quot;</span>
<span class="hljs-comment"># I&#x27;m not going to make a</span>
<span class="hljs-comment"># ew line</span>

str2 = <span class="hljs-string">&quot;I&#x27;m not going to make a \\new line.&quot;</span>
<span class="hljs-comment"># I&#x27;m not going to make a \new line</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="13" data-marpit-scope-TG5zn6TH="" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="13" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="44">
<h1 id="1-vs-1">1 vs. &quot;1&quot;</h1>
<ul>
<li><strong>數字 1</strong> 與 <strong>字元 &quot;1&quot;</strong> 在電腦內是<strong>不一樣的兩種資料</strong>。</li>
<li><strong>數字 1</strong> 在記憶體內儲存的，是<strong>數字 1 的二進制表示</strong>。</li>
<li><strong>字元 &quot;1&quot;</strong> 在記憶體內儲存的，是<strong>字元 &quot;1&quot; 的編碼結果，數字 49 的二進制表示</strong>。</li>
</ul>
<p><img src="./ram.png" alt="center" style="width:520px;" /></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="14" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="14" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="44">
<h1 id="%E7%82%BA%E4%BD%95%E9%9C%80%E8%A6%81%E7%B7%A8%E7%A2%BC">為何需要編碼</h1>
<ul>
<li>電腦只認得數字 0、1，不認得文字。</li>
<li><strong>編碼</strong> 可以想像成，為不同的 <strong>東西</strong> 給一個 <strong>號碼</strong> 用來稱呼他。</li>
<li>現實生活中的編碼例子: 姓名 -&gt; 班級座號。</li>
<li>電腦無法儲存文字，透過建立 <strong>文字 -&gt; 數字 的編碼</strong>，儲存編碼的結果，進而能夠儲存、處理文字。</li>
<li>編碼方式需有統一的標準，解碼的結果才會一致。</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="15" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="44">
<h1 id="ascii-%E7%B7%A8%E7%A2%BC">ASCII 編碼</h1>
<ul>
<li>廣泛使用的<strong>字元編碼標準</strong>，定義了常見的英文、數字、符號、控制符號字元的編碼。</li>
<li>共定義了 128 個字元，將字元編碼成 0 - 127 的數字。</li>
<li>常見的 ASCII 編碼:
<ul>
<li><code>'0'</code> - <code>'9'</code> -&gt; 48 - 57</li>
<li><code>'A'</code> - <code>'Z'</code> -&gt; 65 - 90</li>
<li><code>'a'</code> - <code>'z'</code> -&gt; 97 - 122</li>
</ul>
</li>
</ul>
<blockquote>
<p>ASCII 編碼表: <a href="https://en.wikipedia.org/wiki/ASCII#Table_of_codes">https://en.wikipedia.org/wiki/ASCII#Table_of_codes</a></p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="16" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="16" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="44">
<h1 id="%E6%93%8D%E4%BD%9C-ascii">操作 ASCII</h1>
<p>在 Python 中可以使用 <code>ord()</code> 來獲得某個字元的 ASCII 編碼；使用 <code>chr()</code> 來獲得某個 ASCII 編碼對應的字元。</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-built_in">print</span>(<span class="hljs-built_in">ord</span>(<span class="hljs-string">&#x27;0&#x27;</span>)) <span class="hljs-comment"># 48</span>
<span class="hljs-built_in">print</span>(<span class="hljs-built_in">chr</span>(<span class="hljs-number">48</span>)) <span class="hljs-comment"># &#x27;0&#x27;</span>
</code></pre>
<p>透過操作 ASCII 編碼，將字母小寫轉大寫:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">alphabet = <span class="hljs-string">&#x27;x&#x27;</span>
<span class="hljs-built_in">print</span>(<span class="hljs-built_in">chr</span>(<span class="hljs-built_in">ord</span>(alphabet) - <span class="hljs-built_in">ord</span>(<span class="hljs-string">&#x27;a&#x27;</span>) + <span class="hljs-built_in">ord</span>(<span class="hljs-string">&#x27;A&#x27;</span>))) <span class="hljs-comment"># &#x27;X&#x27;</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="17" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="17" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="44">
<h1 id="python-%E7%9A%84%E5%AD%97%E5%85%83%E7%B7%A8%E7%A2%BC">Python 的字元編碼</h1>
<ul>
<li>ASCII 只定義了 128 個字元，但世界上還有很多不同的文字系統。</li>
<li>出現 Unicode 編碼，完整兼容 ASCII 編碼 (0 - 127 的編碼完全相同)，並支援世界上大部分的文字系統，包括中、日、韓、俄、德、西、...，以及各種符號、emoji。</li>
<li>Python 支援 Unicode 編碼。</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;你好&quot;</span>)
<span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;これもOKです&quot;</span>)
<span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;<img class="emoji" draggable="false" alt="🥺" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@16.0.1/assets/svg/1f97a.svg" data-marp-twemoji=""/>&quot;</span>)
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="18" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="18" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="44">
<h1 id="1-vs-1-1">1 vs. &quot;1&quot;</h1>
<p><strong>1</strong>:</p>
<ul>
<li>是 <strong>整數(int)</strong> 型別，在記憶體內儲存的內容是數字 1。</li>
<li>可進行<strong>整數相關的操作</strong>，如算術運算(加、減、乘、除)、比大小等。</li>
</ul>
<p><strong>&quot;1&quot;</strong>:</p>
<ul>
<li>是 <strong>字串(string)</strong> 型別，在記憶體內儲存的內容是數字 49。</li>
<li>可進行<strong>字串相關的操作</strong>，如字串串接、<code>.replace()</code>、<code>.split()</code> 等方法。</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="19" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="19" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="44">
<h1 id="1-vs-1-2">1 vs. &quot;1&quot;</h1>
<p><strong>1 + &quot;1&quot;</strong> = ?</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-log">TypeError: unsupported operand type(s) for +: 'int' and 'str'
</code></pre>
<p>不支援將整數(int)及字串(str)相加。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="20" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="20" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="44">
<h1 id="behind-printstring">Behind <code>print(&quot;string&quot;)</code></h1>
<ul>
<li>使用 <code>print()</code> 時，本質上 Python 是把<strong>字串中每個字元的編碼結果，逐一送給 console</strong>。</li>
<li>console 手上有 <strong>字元編碼</strong> 與 <strong>字元圖形</strong> 的對應表，也就是 <strong>字體</strong>。</li>
<li>console 根據收到的字串，將每個字元的圖形一一畫在螢幕上，成為我們看到的輸出結果。</li>
<li>從這個角度來看，<code>print()</code> 的參數必定是字串。</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="21" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="21" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="44">
<h1 id="about-print1">About <code>print(1)</code></h1>
<ul>
<li><code>print(&quot;1&quot;)</code> 可以嗎 ? 可以，因為 <code>&quot;1&quot;</code> 是合法的字串。</li>
<li><code>print(1)</code> 可以嗎 ? 可以，不過原因是，在 <code>print()</code> 的實做中，Python 會偷偷將 <strong>整數 1</strong> 透過 &quot;類似&quot; <code>str(1)</code> 的概念，先轉型成 <strong>字串 &quot;1&quot;</strong>。</li>
</ul>
<blockquote>
<p>可以參考 pypy 的實做更深入理解: <a href="https://github.com/pypy/pypy/blob/bab69dca82606f9e4feaf5507f8dd8dfb3e968b2/pypy/module/__builtin__/app_io.py#L96">pypy/module/__builtin__/app_io.py#L96</a><br />
&quot;類似&quot; <code>str(1)</code> 的說法，是因為在我們使用的 CPython 實做中，並不會有顯式的 <code>str(1)</code> 呼叫。</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="22" data-paginate="true" data-class="lead" data-theme="custom-academic" lang="en-US" class="lead" data-marpit-pagination="22" style="--paginate:true;--class:lead;--theme:custom-academic;" data-marpit-pagination-total="44">
<h1 id="%E5%AD%97%E4%B8%B2%E4%BD%BF%E7%94%A8">字串使用</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="23" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="23" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="44">
<h1 id="%E5%8F%96%E5%BE%97%E5%AD%97%E4%B8%B2">取得字串</h1>
<ol>
<li>直接寫在程式裡，如: <code>str1 = &quot;string&quot;</code>。</li>
<li>透過呼叫的回傳取得，如: <code>str2 = input()</code>。</li>
<li>透過轉型(本質上還是 2.)，如: <code>str3 = str(1.1)</code>。</li>
</ol>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="24" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="24" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="44">
<h1 id="%E5%AD%97%E4%B8%B2%E9%81%8B%E7%AE%97">字串運算</h1>
<ol>
<li>加法 - 串接: <code>&quot;He&quot; + &quot;llo&quot;</code> =&gt; <code>&quot;Hello&quot;</code>。</li>
<li>乘法 - 重複: <code>&quot;Ha&quot; * 3</code> =&gt; <code>&quot;HaHaHa&quot;</code>。</li>
<li>比大小 - 字典序(編碼後的數字)比較:
<ul>
<li><code>'A' &gt; 'a'</code> =&gt; <code>False</code>。</li>
<li><code>'a' &gt; '?'</code> =&gt; <code>True</code>。</li>
<li>判斷字元是否為大寫字母: <code>'A' &lt;= c &lt;= 'Z'</code>。</li>
<li><code>'aca' &gt; 'abz'</code> (多字元則依序比較，直到第一個分出大小) =&gt; <code>True</code>。</li>
<li><code>'aaaa' &gt; 'aaa'</code> (若字元比完比不出來，最後比長度) =&gt; <code>True</code>。</li>
</ul>
</li>
</ol>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="25" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="25" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="44">
<h1 id="%E5%8F%AF%E8%BF%AD%E4%BB%A3%E7%89%A9%E4%BB%B6iterable">可迭代物件(iterable)</h1>
<ul>
<li>string 是一個 iterable，<strong>可以使用 iterable 相關的功能</strong>。</li>
<li>list 也是 iterable，可以想像某些 list 的功能也可以被用在 string 上。</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">hw = <span class="hljs-string">&quot;Hello, World&quot;</span>

<span class="hljs-comment"># 可以透過 index 來得到單一字元</span>
<span class="hljs-built_in">print</span>(hw[<span class="hljs-number">0</span>]) <span class="hljs-comment"># H</span>

<span class="hljs-comment"># 可以使用 slice 相關的功能</span>
<span class="hljs-built_in">print</span>(hw[<span class="hljs-number">0</span>:<span class="hljs-number">5</span>], hw[<span class="hljs-number">11</span>:<span class="hljs-number">6</span>:-<span class="hljs-number">1</span>]) <span class="hljs-comment"># Hello dlroW</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="26" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="26" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="44">
<h1 id="%E5%8F%AF%E8%BF%AD%E4%BB%A3%E7%89%A9%E4%BB%B6iterable-1">可迭代物件(iterable)</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">hw = <span class="hljs-string">&quot;Hello, World&quot;</span>

<span class="hljs-comment"># 可以使用 for 來遍歷</span>
<span class="hljs-keyword">for</span> c <span class="hljs-keyword">in</span> hw:
    <span class="hljs-built_in">print</span>(c, end=<span class="hljs-string">&#x27;_&#x27;</span>)
<span class="hljs-comment"># H_e_l_l_o_,_ _W_o_r_l_d_</span>

<span class="hljs-comment"># 可以透過 len() 取得長度</span>
<span class="hljs-built_in">print</span>(<span class="hljs-built_in">len</span>(hw)) <span class="hljs-comment"># 12</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="27" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="27" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="44">
<h1 id="%E4%B8%8D%E5%8F%AF%E8%AE%8Aimmutable">不可變(immutable)</h1>
<p>string 和 list 不同的是，<strong>string 在 Python 中是不可變的</strong>。</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">h = <span class="hljs-string">&quot;Hollo&quot;</span>
h[<span class="hljs-number">1</span>] = <span class="hljs-string">&#x27;e&#x27;</span>
</code></pre>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-log">TypeError: 'str' object does not support item assignment
</code></pre>
<blockquote>
<p>不可變指的是在 string 的實做中，不存在有任何能改變其內部結構的功能。<br />
有興趣可以到網路上查詢相關設計的原因。</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="28" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="28" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="44">
<h1 id="%E9%9B%96%E7%84%B6%E4%BD%86%E6%98%AF-%E6%88%91%E9%82%84%E6%98%AF%E6%83%B3%E4%BF%AE%E6%94%B9">雖然但是... 我還是想修改</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">h = <span class="hljs-string">&quot;Hollo&quot;</span>
h = h[:<span class="hljs-number">1</span>] + <span class="hljs-string">&#x27;e&#x27;</span> + h[<span class="hljs-number">2</span>:] <span class="hljs-comment"># &quot;Hello&quot;</span>
</code></pre>
<p>雖然最後達到了修改的效果，但背後運作並不是把原字串的第二個字改掉，而是<strong>創建 <code>&quot;H&quot;</code>、<code>&quot;e&quot;</code>、<code>&quot;llo&quot;</code> 三個字串，最後串接起來</strong>。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="29" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="29" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="44">
<h1 id="string-%E6%96%B9%E6%B3%95methods">String 方法(methods)</h1>
<ul>
<li>Python 為 string 內建實做了許多有用的功能，可以不用自己實做。</li>
<li>以下介紹的<strong>常用 method 可以記憶、熟悉其用法</strong>。但<strong>不用背下 string 所有的內建 method</strong>。</li>
<li>大多數的<strong>內建 method，都可以自行在 Python 內實做</strong>。但<strong>使用內建的 method</strong> 可以有更多好處，如: <strong>更好的執行效率</strong>、<strong>不用擔心正確性</strong>。</li>
<li>在需要操作字串時，可以上網搜尋是否有相關的內建方法。若找不到，就面對挑戰，自己做吧~</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="30" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="30" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="44">
<h1 id="split"><code>.split()</code></h1>
<p>將 <strong>原字串(放在點點前面)</strong> 依 <strong>提供的分隔符號(另一個字串，放在小括號內)</strong> <strong>進行分割</strong>，回傳一個字串的 list，表示所有被分開的段落。</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">str1 = <span class="hljs-string">&quot;A, B, C&quot;</span>
outcome = str1.split(<span class="hljs-string">&quot;, &quot;</span>)
<span class="hljs-built_in">print</span>(outcome) <span class="hljs-comment"># [&quot;A&quot;, &quot;B&quot;, &quot;C&quot;]</span>
</code></pre>
<p>若不指定分隔字串，預設會用空白 <code>' '</code> 當作分隔字串。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="31" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="31" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="44">
<h1 id="judge-usage">Judge usage</h1>
<p>Judge 中經常會有 <em>第一行為兩個數字 n, m，用空白分隔，...</em> 相關的輸入規格，這時就會用到 <code>.split()</code>。</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">judge_input = <span class="hljs-built_in">input</span>() <span class="hljs-comment"># &quot;1 2&quot;</span>
split_outcome = judge_input.split() <span class="hljs-comment"># [&quot;1&quot;, &quot;2&quot;]</span>
n, m = split_outcome <span class="hljs-comment"># unpack, n = &quot;1&quot;, m = &quot;2&quot;</span>
n, m = <span class="hljs-built_in">int</span>(n), <span class="hljs-built_in">int</span>(m)
</code></pre>
<p>精簡版本: <code>n, m = map(int, input().split())</code></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="32" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="32" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="44">
<h1 id="replace"><code>.replace()</code></h1>
<p>將 <strong>原字串(放在點點前面)</strong> 內 <strong>指定的 pattern (另一個字串，放在小括號內的第一個參數)</strong> <strong>替換成另一個 pattern (另一個字串，放在小括號內的第二個參數)</strong>，回傳替換後的字串。</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">text = <span class="hljs-string">&quot;I like banana&quot;</span>
new_text = text.replace(<span class="hljs-string">&quot;banana&quot;</span>, <span class="hljs-string">&quot;apple&quot;</span>)
<span class="hljs-built_in">print</span>(text) <span class="hljs-comment"># I like banana</span>
<span class="hljs-built_in">print</span>(new_text) <span class="hljs-comment"># I like apple</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="33" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="33" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="44">
<h1 id="strip"><code>.strip()</code></h1>
<p>將 <strong>原字串(放在點點前面) 字串最前方連續、最後方連續指定的字元們 (另一個字串，放在小括號內) 刪除</strong>，回傳處理後的字串。</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">str1 = <span class="hljs-string">&quot;   123 &quot;</span>
strip_str1 = str1.strip() <span class="hljs-comment"># &quot;123&quot;</span>

str2 = <span class="hljs-string">&quot;www.example.com&quot;</span>
strip_str2 = str2.strip(<span class="hljs-string">&quot;w.com&quot;</span>) <span class="hljs-comment"># &quot;example&quot;</span>
</code></pre>
<p>若不指定 strip 字元，預設為 <code>' '</code>。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="34" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="34" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="44">
<h1 id="more">More</h1>
<ul>
<li><code>.join()</code>: split 的逆運算。</li>
<li><code>.find()</code>: 在原字串中尋找一個 pattern。</li>
<li><code>.lower()</code>/<code>.upper()</code>: 將原字串字母全部轉成小寫/大寫。</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="35" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="35" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="44">
<h1 id="%E5%A4%9A%E8%A1%8C%E5%AD%97%E4%B8%B2">多行字串</h1>
<p>用 <strong>三個雙引號(<code>&quot;&quot;&quot;</code>)</strong> 開始一個多行字串，可以用來<strong>撰寫有結構文字</strong>，也是 <strong>Python 內多行註解的標準方法</strong>。</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">str1 = <span class="hljs-string">&quot;&quot;&quot;
Never gonna give you up
Never gonna let you down
Never gonna run around and desert you
&quot;&quot;&quot;</span>

<span class="hljs-built_in">print</span>(str1)
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="36" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="36" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="44">
<h1 id="%E5%A4%9A%E8%A1%8C%E8%A8%BB%E8%A7%A3">多行註解</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-string">&quot;&quot;&quot;
for i in range(10):
    print(&quot;foo&quot;)
&quot;&quot;&quot;</span>

<span class="hljs-keyword">for</span> i <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(<span class="hljs-number">10</span>):
    <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;bar&quot;</span>)
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="37" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="37" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="44">
<h1 id="f-string-%E7%B0%A1%E4%BB%8B">f-string 簡介</h1>
<ul>
<li>Formatted string literal。</li>
<li>在一般的字串前加上 <code>f</code>，用來表示這是一個 f-string。</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">answer1, answer2 = <span class="hljs-number">1</span>, <span class="hljs-number">2</span>

<span class="hljs-comment"># Without f-string</span>
<span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;The answer is: (&quot;</span> + <span class="hljs-built_in">str</span>(answer1) + <span class="hljs-string">&quot;, &quot;</span> + <span class="hljs-built_in">str</span>(answer2) + <span class="hljs-string">&quot;)&quot;</span>)

<span class="hljs-comment"># With f-string:</span>
<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;The answer is: (<span class="hljs-subst">{answer1}</span>, <span class="hljs-subst">{answer2}</span>)&quot;</span>)
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="38" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="38" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="44">
<h1 id="f-string-%E8%AA%9E%E6%B3%95">f-string 語法</h1>
<ul>
<li>在 f-string 內，用一對 <strong>大括號(<code>{}</code>)</strong>，表示要將<strong>括號內的內容格式化成文字</strong>，裡面可以放變數、運算式、函式呼叫等等。</li>
<li>在大括號內，<strong>可以在最後加上 modifier 額外調整格式化的方式</strong>。</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">w, h = <span class="hljs-number">50</span>, <span class="hljs-number">1.7</span>
<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;BMI is: <span class="hljs-subst">{w / (h ** <span class="hljs-number">2</span>)}</span>&quot;</span>)
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="39" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="39" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="44">
<h1 id="f-string-modifier">f-string modifier</h1>
<p>padding and alignment:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;|<span class="hljs-subst">{<span class="hljs-string">&#x27;姓名&#x27;</span>:^<span class="hljs-number">10</span>}</span>|<span class="hljs-subst">{<span class="hljs-string">&#x27;座號&#x27;</span>:^<span class="hljs-number">10</span>}</span>|&quot;</span>)
<span class="hljs-comment"># |    姓名    |    座號    |</span>

<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;|<span class="hljs-subst">{<span class="hljs-string">&#x27;姓名&#x27;</span>:*&lt;<span class="hljs-number">4</span>}</span>|<span class="hljs-subst">{<span class="hljs-string">&#x27;座號&#x27;</span>:*&lt;<span class="hljs-number">4</span>}</span>|&quot;</span>)
<span class="hljs-comment"># |姓名**|座號**|</span>

<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;|<span class="hljs-subst">{<span class="hljs-string">&#x27;姓名&#x27;</span>:-&gt;<span class="hljs-number">8</span>}</span>|<span class="hljs-subst">{<span class="hljs-string">&#x27;座號&#x27;</span>:-&gt;<span class="hljs-number">8</span>}</span>|&quot;</span>)
<span class="hljs-comment"># |------姓名|------座號|</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="40" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="40" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="44">
<h1 id="f-string-modifier-1">f-string modifier</h1>
<p>小數進位:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">pi = <span class="hljs-number">3.1415926</span>

<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;pi: <span class="hljs-subst">{pi:<span class="hljs-number">.2</span>f}</span>&quot;</span>)
<span class="hljs-comment"># 3.14</span>

<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;pi: <span class="hljs-subst">{pi:<span class="hljs-number">.3</span>f}</span>&quot;</span>)
<span class="hljs-comment"># 3.142</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="41" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="41" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="44">
<h1 id="f-string-modifier-2">f-string modifier</h1>
<p>Debug:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">outcome = <span class="hljs-string">&quot;haha&quot;</span>

<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;<span class="hljs-subst">{outcome=}</span>&quot;</span>)
<span class="hljs-comment"># outcome=&#x27;haha&#x27;</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="42" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="42" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="44">
