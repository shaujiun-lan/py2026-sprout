<li>針對靜態網頁，能夠有<strong>很好的執行效率</strong>。

<li>你可以想像 BeautifulSoup 做的，僅僅是非常複雜的字串操作。</li>
</ul>
</li>

</ul>

<header>2026 資訊之芽 Python 語法班 Python Selenium 簡報</header>

<h1 id="%E7%80%8F%E8%A6%BD%E5%99%A8%E8%87%AA%E5%8B%95%E5%8C%96%E5%8B%95%E6%A9%9F">瀏覽器自動化動機</h1>
<div class="tmp-cont">
<div class="tmp-content">
<ul>
<li>當代網頁應用 (如: YouTube、Facebook 等) 從靜態網頁文件，演變為<strong>複雜的 Javascript 應用</strong>。</li>
<li><strong>網頁內容</strong>並非透過單一 HTTP request 獲得，而是<strong>由複雜的 Javascript 程式決定</strong> (如: <a href="https://zh.wikipedia.org/zh-tw/AJAX">AJAX</a>)。</li>
<li>傳統靜態文件分析的策略，不能用來自動化操作這類網頁應用。</li>
<li>透過<strong>跑起完整瀏覽器</strong>，<strong>模擬人類操作瀏覽器</strong>的行為，來<strong>自動化操作</strong>。</li>
</ul>
</div>
<div>
<p><img src="./images/ajax.png" alt="ajax" style="width:950px;" /></p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" data-header="2026 資訊之芽 Python 語法班 Python Selenium 簡報" data-paginate="true" data-theme="ruri" lang="zh-TW" data-marpit-pagination="6" style="--header:2026 資訊之芽 Python 語法班 Python Selenium 簡報;--paginate:true;--theme:ruri;" data-marpit-pagination-total="40">

<p></p>
<p>不論從企業或應用開發的角度，自動化操作網頁應用，都有相當實務的需求:</p>
<ul>
<li>針對網頁開發的<strong>自動化測試</strong>、模擬多用戶使用的<strong>規模測試</strong>。</li>
<li>針對<strong>重複</strong>但<strong>涉及複雜機制的網頁操作工作</strong>進行自動化。</li>
<li>現也被用來擴展 <strong>AI agent</strong> 的能力，使其能自主<strong>操作網頁</strong>。</li>
<li>...</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" data-header="2026 資訊之芽 Python 語法班 Python Selenium 簡報" data-paginate="true" data-theme="ruri" lang="zh-TW" data-marpit-pagination="7" style="--header:2026 資訊之芽 Python 語法班 Python Selenium 簡報;--paginate:true;--theme:ruri;" data-marpit-pagination-total="40">
<header>2026 資訊之芽 Python 語法班 Python Selenium 簡報</header>

<p><img src="./images/web_driver.png" alt="web_driver center" style="width:1150px;" /></p>
<p>WebDriver 定義了<strong>自動化操作瀏覽器的介面</strong>，它扮演<strong>翻譯</strong>的角色，將定義的<strong>自動化操作 request</strong>，翻譯成實際操作<strong>不同瀏覽器的 command</strong>。</p>
<p>不同的瀏覽器需要<strong>不同的 WebDriver</strong>，由各瀏覽器提供商實作。</p>
</section>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" data-header="2026 資訊之芽 Python 語法班 Python Selenium 簡報" data-paginate="true" data-theme="ruri" lang="zh-TW" data-marpit-pagination="9" style="--header:2026 資訊之芽 Python 語法班 Python Selenium 簡報;--paginate:true;--theme:ruri;" data-marpit-pagination-total="40">

<ul>
<li><a href="https://mojlaw.moj.gov.tw/LawContent.aspx?LSID=FL001424&amp;lawNumber=358&amp;TypeSort=2">刑法 第三十六章 妨害電腦使用罪</a>
<ul>
<li>第 360 條</li>
</ul>
<blockquote>
<p><em>無故以電腦程式或其他電磁方式干擾他人電腦或其相關設備，致生損害於公眾或他人者，處三年以下有期徒刑、拘役或科或併科三十萬元以下罰金。</em></p>
</blockquote>
<ul>
<li>第 362 條</li>
</ul>
<blockquote>
<p><em>製作專供犯本章之罪之電腦程式，而供自己或他人犯本章之罪，致生損害於公眾或他人者，處五年以下有期徒刑、拘役或科或併科六十萬元以下罰金。</em></p>
</blockquote>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" data-header="2026 資訊之芽 Python 語法班 Python Selenium 簡報" data-paginate="true" data-theme="ruri" lang="zh-TW" data-marpit-pagination="10" style="--header:2026 資訊之芽 Python 語法班 Python Selenium 簡報;--paginate:true;--theme:ruri;" data-marpit-pagination-total="40">

<ul>
<li><a href="https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=H0170075&amp;flno=10-1">文化創意產業發展法 第 10-1 條第 3 項</a></li>
</ul>
<blockquote>
<p><em>以虛偽資料或其他不正方式，利用電腦或其他相關設備購買藝文表演票券，取得訂票或取票憑證者，處三年以下有期徒刑，或科或併科新台幣三百萬元以下罰金。</em></p>
</blockquote>
<ul>
<li><a href="https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=H0120056">運動產業發展條例 第 24-1 條第 3 項</a></li>
</ul>
<blockquote>
<p><em>以虛偽資料或其他不正方式，利用電腦或其他相關設備購買運動賽事或活動票券，取得訂票或取票憑證者，處三年以下有期徒刑，或科或併科新臺幣三百萬元以下罰金。</em></p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" data-header="2026 資訊之芽 Python 語法班 Python Selenium 簡報" data-paginate="true" data-class="lead" data-theme="ruri" lang="zh-TW" class="lead" data-marpit-pagination="11" style="--header:2026 資訊之芽 Python 語法班 Python Selenium 簡報;--paginate:true;--class:lead;--theme:ruri;" data-marpit-pagination-total="40">
<header>2026 資訊之芽 Python 語法班 Python Selenium 簡報</header>

<h1 id="start">Start</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" data-header="2026 資訊之芽 Python 語法班 Python Selenium 簡報" data-paginate="true" data-theme="ruri" lang="zh-TW" data-marpit-pagination="12" style="--header:2026 資訊之芽 Python 語法班 Python Selenium 簡報;--paginate:true;--theme:ruri;" data-marpit-pagination-total="40">
<header>2026 資訊之芽 Python 語法班 Python Selenium 簡報</header>
<h1 id="%E4%B8%8B%E8%BC%89-selenium-%E5%A5%97%E4%BB%B6">下載 Selenium 套件</h1>
<ul>
<li>下載 Python Selenium 套件:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">pip install <span class="hljs-string">&quot;selenium&gt;=4.10&quot;</span>
</code></pre>
<ul>
<li>
<p>下載 WebDriver:</p>
<p>理論上，我們要自己去下載<strong>欲使用的瀏覽器其對應的 WebDriver</strong>，但<strong>在 Selenium 4.6+/4.10+ 以後</strong>，<strong>自帶管理 WebDriver 的功能</strong>。</p>
<p><strong>Selenium 檢查到缺少需要的 WebDriver 時</strong>，<strong>會自己去尋找、下載</strong>，並且 cache 起來。也因此<strong>第一次執行會比較慢</strong>。</p>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="13" data-header="2026 資訊之芽 Python 語法班 Python Selenium 簡報" data-paginate="true" data-theme="ruri" lang="zh-TW" data-marpit-pagination="13" style="--header:2026 資訊之芽 Python 語法班 Python Selenium 簡報;--paginate:true;--theme:ruri;" data-marpit-pagination-total="40">
<header>2026 資訊之芽 Python 語法班 Python Selenium 簡報</header>
<h1 id="%E6%B8%AC%E8%A9%A6-selenium">測試 Selenium</h1>
<p/>
<p>用 Google Chrome 瀏覽器做示範:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-py"><span class="hljs-keyword">from</span> selenium <span class="hljs-keyword">import</span> webdriver
<span class="hljs-keyword">import</span> time

browser = <span class="hljs-literal">None</span>
<span class="hljs-keyword">try</span>:
    browser = webdriver.Chrome()
    browser.get(<span class="hljs-string">&quot;https://sprout.tw/py2026/&quot;</span>)
<span class="hljs-keyword">finally</span>:
    <span class="hljs-keyword">if</span> browser:
        browser.quit()
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="14" data-header="2026 資訊之芽 Python 語法班 Python Selenium 簡報" data-paginate="true" data-theme="ruri" lang="zh-TW" data-marpit-pagination="14" style="--header:2026 資訊之芽 Python 語法班 Python Selenium 簡報;--paginate:true;--theme:ruri;" data-marpit-pagination-total="40">
<header>2026 資訊之芽 Python 語法班 Python Selenium 簡報</header>
<h1 id="%E4%BD%A0%E6%9C%83%E8%A7%80%E5%AF%9F%E5%88%B0">你會觀察到...</h1>
<p/>
<p>一個<strong>瀏覽器被打開</strong>了！但<strong>畫面還沒完整顯示</strong>，<strong>瀏覽器就關掉了</strong>。</p>
<p>因為:</p>
<ol>
<li><code>browser.get()</code> 回傳後，就繼續執行到 <code>browser.quit()</code>，因此瀏覽器會自己關閉。</li>
<li>我們會期待 <code>browser.get()</code> 把畫面完全準備好，才回傳。但 Selenium 預設並不會很 robust 的同步瀏覽器的行為，需要其他機制。</li>
</ol>
<p>最簡單的方式是<strong>加入 <code>time.sleep()</code> 等待幾秒</strong>，<strong>給瀏覽器一小段時間處理</strong>。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" data-header="2026 資訊之芽 Python 語法班 Python Selenium 簡報" data-paginate="true" data-theme="ruri" lang="zh-TW" data-marpit-pagination="15" style="--header:2026 資訊之芽 Python 語法班 Python Selenium 簡報;--paginate:true;--theme:ruri;" data-marpit-pagination-total="40">
<header>2026 資訊之芽 Python 語法班 Python Selenium 簡報</header>
<h1 id="%E5%8A%A0%E5%85%A5%E7%AD%89%E5%BE%85">加入等待</h1>
<p/>
<p>手動加入 <code>time.sleep()</code>，給瀏覽器一小段時間處理。</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-py"><span class="hljs-keyword">from</span> selenium <span class="hljs-keyword">import</span> webdriver
<span class="hljs-keyword">import</span> time

browser = <span class="hljs-literal">None</span>
<span class="hljs-keyword">try</span>:
    browser = webdriver.Chrome()
    browser.get(<span class="hljs-string">&quot;https://sprout.tw/py2026/&quot;</span>)
    time.sleep(<span class="hljs-number">5</span>) <span class="hljs-comment"># 等待 5 秒</span>
<span class="hljs-keyword">finally</span>:
    <span class="hljs-keyword">if</span> browser:
        browser.quit()
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="16" data-header="2026 資訊之芽 Python 語法班 Python Selenium 簡報" data-paginate="true" data-theme="ruri" lang="zh-TW" data-marpit-pagination="16" style="--header:2026 資訊之芽 Python 語法班 Python Selenium 簡報;--paginate:true;--theme:ruri;" data-marpit-pagination-total="40">
<header>2026 資訊之芽 Python 語法班 Python Selenium 簡報</header>
<h1 id="%E6%9C%80%E5%A4%A7%E5%8C%96%E8%A6%96%E7%AA%97">最大化視窗</h1>
<p/>
<p>畫面有點小，把視窗放大吧~</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-py"><span class="hljs-keyword">from</span> selenium <span class="hljs-keyword">import</span> webdriver
<span class="hljs-keyword">import</span> time

browser = <span class="hljs-literal">None</span>
<span class="hljs-keyword">try</span>:
    browser = webdriver.Chrome()
    browser.maximize_window() <span class="hljs-comment"># 將視窗最大化</span>
    browser.get(<span class="hljs-string">&quot;https://sprout.tw/py2026/&quot;</span>)
    time.sleep(<span class="hljs-number">5</span>)
<span class="hljs-keyword">finally</span>:
    <span class="hljs-keyword">if</span> browser:
        browser.quit()
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="17" data-header="2026 資訊之芽 Python 語法班 Python Selenium 簡報" data-paginate="true" data-theme="ruri" lang="zh-TW" data-marpit-pagination="17" style="--header:2026 資訊之芽 Python 語法班 Python Selenium 簡報;--paginate:true;--theme:ruri;" data-marpit-pagination-total="40">
<header>2026 資訊之芽 Python 語法班 Python Selenium 簡報</header>
<h1 id="%E8%AE%93%E8%A6%96%E7%AA%97%E6%9A%AB%E6%99%82%E5%81%9C%E7%95%99">讓視窗暫時停留</h1>
<p/>
<p>透過用 <code>input()</code> 讀取輸入會 block 程式的特性，來<strong>讓程式暫時停住</strong>，<strong>觀察打開的瀏覽器</strong>。</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-py"><span class="hljs-keyword">from</span> selenium <span class="hljs-keyword">import</span> webdriver
<span class="hljs-keyword">import</span> time

browser = <span class="hljs-literal">None</span>
<span class="hljs-keyword">try</span>:
    browser = webdriver.Chrome()
    browser.maximize_window()
    browser.get(<span class="hljs-string">&quot;https://sprout.tw/py2026/&quot;</span>)
    <span class="hljs-built_in">input</span>(<span class="hljs-string">&quot;Press Enter to Exit...&quot;</span>)
<span class="hljs-keyword">finally</span>:
    <span class="hljs-keyword">if</span> browser:
        browser.quit()
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="18" data-header="2026 資訊之芽 Python 語法班 Python Selenium 簡報" data-paginate="true" data-theme="ruri" lang="zh-TW" data-marpit-pagination="18" style="--header:2026 資訊之芽 Python 語法班 Python Selenium 簡報;--paginate:true;--theme:ruri;" data-marpit-pagination-total="40">
<header>2026 資訊之芽 Python 語法班 Python Selenium 簡報</header>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="19" data-header="2026 資訊之芽 Python 語法班 Python Selenium 簡報" data-paginate="true" data-class="lead" data-theme="ruri" lang="zh-TW" class="lead" data-marpit-pagination="19" style="--header:2026 資訊之芽 Python 語法班 Python Selenium 簡報;--paginate:true;--class:lead;--theme:ruri;" data-marpit-pagination-total="40">

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="20" data-header="2026 資訊之芽 Python 語法班 Python Selenium 簡報" data-paginate="true" data-theme="ruri" lang="zh-TW" data-marpit-pagination="20" style="--header:2026 資訊之芽 Python 語法班 Python Selenium 簡報;--paginate:true;--theme:ruri;" data-marpit-pagination-total="40">
<header>2026 資訊之芽 Python 語法班 Python Selenium 簡報</header>

<span class="hljs-tag">&lt;/<span class="hljs-name">body</span>&gt;</span>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="24" data-header="2026 資訊之芽 Python 語法班 Python Selenium 簡報" data-paginate="true" data-theme="ruri" lang="zh-TW" data-marpit-pagination="24" style="--header:2026 資訊之芽 Python 語法班 Python Selenium 簡報;--paginate:true;--theme:ruri;" data-marpit-pagination-total="40">
<header>2026 資訊之芽 Python 語法班 Python Selenium 簡報</header>
<h1 id="wikipedia-%E6%90%9C%E5%B0%8B%E6%AC%84">Wikipedia 搜尋欄</h1>
<p/>
<p>可以從原始碼中，看到搜尋欄在 HTML 中的表示如下:</p>
<p>&lt;<strong>input</strong> <strong>id=&quot;searchInput&quot;</strong> <strong>name=&quot;search&quot;</strong> type=&quot;search&quot; size=&quot;20&quot; autofocus=&quot;autofocus&quot; accesskey=&quot;F&quot; dir=&quot;auto&quot; autocomplete=&quot;off&quot; style=&quot;padding-right: 64px;&quot;&gt;</p>
<p>我們關注的有:</p>
<ul>
<li><code>input</code>: 這個元素的標籤(tag)。</li>
<li><code>id=&quot;searchInput&quot;</code>: 這個元素的 id 屬性。(id 通常給 javascript 使用)</li>
<li><code>name=&quot;search&quot;</code>: 這個元素的 name 屬性。(name 通常給表單資料使用)</li>
<li>我們也會關心 <code>class</code> 屬性，但是這裡沒有。(class 通常給 css 使用)</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="25" data-header="2026 資訊之芽 Python 語法班 Python Selenium 簡報" data-paginate="true" data-theme="ruri" lang="zh-TW" data-marpit-pagination="25" style="--header:2026 資訊之芽 Python 語法班 Python Selenium 簡報;--paginate:true;--theme:ruri;" data-marpit-pagination-total="40">
<header>2026 資訊之芽 Python 語法班 Python Selenium 簡報</header>
<h1 id="%E5%9C%A8-selenium-%E4%B8%AD%E5%AE%9A%E4%BD%8D%E5%85%83%E7%B4%A0">在 Selenium 中定位元素</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-py">element = browser.find_element([用來定位的屬性], [屬性的值])
</code></pre>
<p>以 <code>&lt;div id=&quot;1&quot; name=&quot;2&quot; class=&quot;3&quot;&gt;4&lt;/div&gt;</code> 作為例子:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-py"><span class="hljs-keyword">from</span> selenium.webdriver.common.by <span class="hljs-keyword">import</span> By

e = browser.find_element(By.TAG_NAME, <span class="hljs-string">&quot;div&quot;</span>)
e = browser.find_element(By.ID, <span class="hljs-string">&quot;1&quot;</span>)
e = browser.find_element(By.NAME, <span class="hljs-string">&quot;2&quot;</span>)
e = browser.find_element(By.CLASS_NAME, <span class="hljs-string">&quot;3&quot;</span>)
e = browser.find_element(By.CSS_SELECTOR, <span class="hljs-string">&quot;.3&quot;</span>)
</code></pre>
<p>若在同一份 HTML 內有<strong>多個符合的目標</strong>，會<strong>定位到第一個符合的元素</strong>。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="26" data-header="2026 資訊之芽 Python 語法班 Python Selenium 簡報" data-paginate="true" data-theme="ruri" lang="zh-TW" data-marpit-pagination="26" style="--header:2026 資訊之芽 Python 語法班 Python Selenium 簡報;--paginate:true;--theme:ruri;" data-marpit-pagination-total="40">
<header>2026 資訊之芽 Python 語法班 Python Selenium 簡報</header>
<h1 id="%E7%94%A8-selenium-%E5%AE%9A%E4%BD%8D%E6%90%9C%E5%B0%8B%E6%AC%84">用 Selenium 定位搜尋欄</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-py"><span class="hljs-keyword">from</span> selenium <span class="hljs-keyword">import</span> webdriver
<span class="hljs-keyword">from</span> selenium.webdriver.common.by <span class="hljs-keyword">import</span> By 
<span class="hljs-keyword">import</span> time

browser = <span class="hljs-literal">None</span>
<span class="hljs-keyword">try</span>:
    browser = webdriver.Chrome()
    browser.maximize_window()
    browser.get(<span class="hljs-string">&quot;https://www.wikipedia.org/&quot;</span>)
    time.sleep(<span class="hljs-number">1</span>) <span class="hljs-comment"># 等網站載入完成</span>
    search_bar = browser.find_element(By.ID, <span class="hljs-string">&quot;searchInput&quot;</span>) <span class="hljs-comment"># 定位搜尋欄的 element</span>
<span class="hljs-keyword">finally</span>:
    <span class="hljs-keyword">if</span> browser:
        browser.quit()
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="27" data-header="2026 資訊之芽 Python 語法班 Python Selenium 簡報" data-paginate="true" data-theme="ruri" lang="zh-TW" data-marpit-pagination="27" style="--header:2026 資訊之芽 Python 語法班 Python Selenium 簡報;--paginate:true;--theme:ruri;" data-marpit-pagination-total="40">
<header>2026 資訊之芽 Python 語法班 Python Selenium 簡報</header>
<h1 id="%E6%A8%A1%E6%93%AC%E4%BD%BF%E7%94%A8%E8%80%85%E8%BC%B8%E5%85%A5%E6%96%87%E5%AD%97">模擬使用者輸入文字</h1>
<p/>
<p>模擬使用者在<strong>搜尋欄內輸入文字</strong>，並且<strong>輸入 enter 進行搜尋</strong>。</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-py"><span class="hljs-keyword">from</span> selenium.webdriver.common.keys <span class="hljs-keyword">import</span> Keys

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="29" data-header="2026 資訊之芽 Python 語法班 Python Selenium 簡報" data-paginate="true" data-theme="ruri" lang="zh-TW" data-marpit-pagination="29" style="--header:2026 資訊之芽 Python 語法班 Python Selenium 簡報;--paginate:true;--theme:ruri;" data-marpit-pagination-total="40">
<header>2026 資訊之芽 Python 語法班 Python Selenium 簡報</header>

</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="30" data-header="2026 資訊之芽 Python 語法班 Python Selenium 簡報" data-paginate="true" data-theme="ruri" lang="zh-TW" data-marpit-pagination="30" style="--header:2026 資訊之芽 Python 語法班 Python Selenium 簡報;--paginate:true;--theme:ruri;" data-marpit-pagination-total="40">
<header>2026 資訊之芽 Python 語法班 Python Selenium 簡報</header>
<h1 id="%E5%AF%86%E6%96%87%E5%BD%A2%E5%BC%8F">密文形式</h1>
<p/>
<p>秘密被拆成了<strong>四段</strong>，<strong>任務一對應到第一段</strong>，任務二對應到第二段，依此類推。把<strong>四個任務得到的段落串接在一起，即可得到完整的秘密訊息</strong>。</p>
<p>任務完成後，<strong>系統會透過 <code>alert()</code> 的方式告訴你對應的秘密訊息段落</strong>。</p>
<p><img src="./images/alert.png" alt="alert center" style="height:300px;" /></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="31" data-header="2026 資訊之芽 Python 語法班 Python Selenium 簡報" data-paginate="true" data-theme="ruri" lang="zh-TW" data-marpit-pagination="31" style="--header:2026 資訊之芽 Python 語法班 Python Selenium 簡報;--paginate:true;--theme:ruri;" data-marpit-pagination-total="40">
<header>2026 資訊之芽 Python 語法班 Python Selenium 簡報</header>
<h1 id="%E5%9C%A8-selenium-%E6%93%8D%E4%BD%9C-alert-%E8%A6%96%E7%AA%97">在 Selenium 操作 alert 視窗</h1>
<p/>
<p>你可以透過以下程式<strong>操作 alert 視窗</strong>，製作一次解完四個任務的 Selenium 程式。<br />
(或者要一個一個任務做，手動複製 alert 視窗內文字，也可以。)</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-py"><span class="hljs-keyword">from</span> selenium.webdriver.support.ui <span class="hljs-keyword">import</span> WebDriverWait
<span class="hljs-keyword">from</span> selenium.webdriver.support <span class="hljs-keyword">import</span> expected_conditions <span class="hljs-keyword">as</span> EC

WebDriverWait(browser, <span class="hljs-number">5</span>).until(EC.alert_is_present()) <span class="hljs-comment"># 等到 alert 出現 (最多 5 秒)</span>
alert = browser.switch_to.alert
alert_text = alert.text <span class="hljs-comment"># alert 裡的文字內容</span>
<span class="hljs-built_in">print</span>(alert_text)
alert.accept() <span class="hljs-comment"># 做出確認的動作</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="32" data-header="2026 資訊之芽 Python 語法班 Python Selenium 簡報" data-paginate="true" data-theme="ruri" lang="zh-TW" data-marpit-pagination="32" style="--header:2026 資訊之芽 Python 語法班 Python Selenium 簡報;--paginate:true;--theme:ruri;" data-marpit-pagination-total="40">

<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-html"><span class="hljs-tag">&lt;<span class="hljs-name">div</span> <span class="hljs-attr">class</span>=<span class="hljs-string">&quot;container&quot;</span>&gt;</span>

    <span class="hljs-tag">&lt;<span class="hljs-name">div</span> <span class="hljs-attr">class</span>=<span class="hljs-string">&quot;box&quot;</span> <span class="hljs-attr">id</span>=<span class="hljs-string">&quot;b3&quot;</span>&gt;</span>[不給你看]<span class="hljs-tag">&lt;/<span class="hljs-name">div</span>&gt;</span>
    <span class="hljs-tag">&lt;<span class="hljs-name">div</span> <span class="hljs-attr">class</span>=<span class="hljs-string">&quot;box&quot;</span> <span class="hljs-attr">id</span>=<span class="hljs-string">&quot;b4&quot;</span>&gt;</span>[不給你看]<span class="hljs-tag">&lt;/<span class="hljs-name">div</span>&gt;</span>

</code></pre>
<ul>

</ul>
</section>

<header>2026 資訊之芽 Python 語法班 Python Selenium 簡報</header>
<h1 id="selenium-%E6%93%8D%E4%BD%9C%E6%BB%91%E9%BC%A0">Selenium 操作滑鼠</h1>
<p>在 Selenium 中操作滑鼠，需要使用 <code>ActionChains</code> 這個特別的物件，用來表示一連串操作。更多使用請參考<a href="https://www.selenium.dev/documentation/webdriver/actions_api/mouse/">官方文件</a>。</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-py"><span class="hljs-keyword">from</span> selenium.webdriver <span class="hljs-keyword">import</span> ActionChains

actions = ActionChains(browser) <span class="hljs-comment"># 建立 ActionChains 實體來記錄一連串操作</span>

actions.move_to_element(e) <span class="hljs-comment"># 將滑鼠移到某個元素上</span>
actions.move_by_offset(x_offset, y_offset) <span class="hljs-comment"># 將滑鼠移動 x_offset, y_offset</span>

actions.perform() <span class="hljs-comment"># 執行這一連串動作</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="37" data-header="2026 資訊之芽 Python 語法班 Python Selenium 簡報" data-paginate="true" data-theme="ruri" lang="zh-TW" data-marpit-pagination="37" style="--header:2026 資訊之芽 Python 語法班 Python Selenium 簡報;--paginate:true;--theme:ruri;" data-marpit-pagination-total="40">

<header>2026 資訊之芽 Python 語法班 Python Selenium 簡報</header>
<h1 id="%E6%9B%B4%E8%81%B0%E6%98%8E%E7%9A%84%E7%AD%89%E5%BE%85">更聰明的等待</h1>
<p/>
<ul>
<li>在使用 Selenium 的時候，經常會遇到 <strong>Python 程式需要停下來，等待瀏覽器操作完成 / 變穩定，再繼續的情況</strong>。</li>
<li>簡單的作法是透過 <code>time.sleep()</code> 來強制程式停下來等，但這樣並不夠優雅。</li>
<li>Selenium 支援語法，<strong>等待直到某個元素，或者某個事件，存在獲滿足條件</strong>。</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-py"><span class="hljs-keyword">from</span> selenium.webdriver.support.ui <span class="hljs-keyword">import</span> WebDriverWait
<span class="hljs-keyword">from</span> selenium.webdriver.support <span class="hljs-keyword">import</span> expected_conditions <span class="hljs-keyword">as</span> EC

wait = WebDriverWait(browser, <span class="hljs-number">5</span>) <span class="hljs-comment"># 建立等待的實體，5 表示最多等 5 秒</span>
wait.until(EC.presence_of_element_located(By.TAG_NAME, <span class="hljs-string">&quot;body&quot;</span>)) <span class="hljs-comment"># 等待到內容準備好</span>
</code></pre>
</section>

<p/>
<p>今天介紹的僅是冰山一角，有興趣可以到 <a href="https://www.selenium.dev/">官方網站</a>、<a href="https://selenium-python.readthedocs.io/">官方文件</a> 查詢更多使用方式。</p>

<li>...</li>
