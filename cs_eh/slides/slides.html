<h4 id="2026-%E8%B3%87%E8%A8%8A%E4%B9%8B%E8%8A%BD-python-%E8%AA%9E%E6%B3%95%E7%8F%AD-%E7%B0%A1%E5%A0%B1">2026 資訊之芽 Python 語法班 簡報</h4>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="2" data-paginate="true" data-class="lead" data-theme="custom-academic" lang="en-US" class="lead" data-marpit-pagination="2" style="--paginate:true;--class:lead;--theme:custom-academic;" data-marpit-pagination-total="62">
<h1 id="coding-style">Coding Style</h1>
<h4 id="%E5%A6%82%E4%BD%95%E5%AF%AB%E5%A5%BD%E7%9C%8B%E7%9A%84%E7%A8%8B%E5%BC%8F">如何寫好看的程式</h4>
<p>「程式碼被閱讀的次數，遠多於被撰寫的次數」</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="3" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="3" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="62">
<h2 id="%E9%8C%AF%E8%AA%A4%E7%A4%BA%E7%AF%84">錯誤示範</h2>
<p>很糟的 coding style 會帶來的問題：</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-py">v=<span class="hljs-built_in">int</span>(<span class="hljs-built_in">input</span>());V=[<span class="hljs-number">0</span>]*v;A=[[<span class="hljs-number">0</span>]*<span class="hljs-number">3</span><span class="hljs-keyword">for</span> _ <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(v)]
<span class="hljs-keyword">for</span> _ <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(v):x,a,b,c=<span class="hljs-built_in">map</span>(<span class="hljs-built_in">int</span>,<span class="hljs-built_in">input</span>().split());A[x][<span class="hljs-number">0</span>]=a;A[x][<span class="hljs-number">1</span>]=b;A[x][<span class="hljs-number">2</span>]=c
<span class="hljs-keyword">def</span> <span class="hljs-title function_">t</span>(<span class="hljs-params">n</span>):V[n]=<span class="hljs-number">1</span>;[t(A[n][i])<span class="hljs-keyword">for</span> i <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(<span class="hljs-number">3</span>)<span class="hljs-keyword">if</span> <span class="hljs-keyword">not</span> V[A[n][i]]]
t(<span class="hljs-number">0</span>)
<span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;True&quot;</span><span class="hljs-keyword">if</span> <span class="hljs-built_in">sum</span>(V)==v <span class="hljs-keyword">else</span><span class="hljs-string">&quot;False&quot;</span>)
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="4" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="4" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="62">
<h2 id="%E5%A6%82%E4%BD%95%E6%94%B9%E9%80%B2">如何改進</h2>
<ul>
<li>錯誤示範的問題：
<ul>
<li>排版</li>
<li>變數命名</li>
</ul>
</li>
<li>如何解決：
<ul>
<li>寫好看一點 (?)</li>
<li><a href="https://peps.python.org/pep-0008/">PEP 8 - Style Guide for Python Code</a></li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="5" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="62">
<h2 id="%E5%9F%BA%E7%A4%8E%E6%8E%92%E7%89%88-1">基礎排版 (1)</h2>
<p><em>我在看大家 1! 作業的時候，發現大家不太會排版 QQ</em></p>
<p>適當<strong>使用空格(在運算符號前後)</strong>，讓程式看起來不會這麼緊湊。</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-py">a = <span class="hljs-number">1</span>
b = a * a
</code></pre>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-py">a=<span class="hljs-number">1</span>
b=a*a
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="6" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="62">
<h2 id="%E5%9F%BA%E7%A4%8E%E6%8E%92%E7%89%88-2">基礎排版 (2)</h2>
<p>適時的<strong>加入空行</strong>，分開程式碼的不同段落。</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-py">n, m = <span class="hljs-built_in">map</span>(<span class="hljs-built_in">int</span>, <span class="hljs-built_in">input</span>().split())
mat = [<span class="hljs-built_in">list</span>(<span class="hljs-built_in">map</span>(<span class="hljs-built_in">int</span>, <span class="hljs-built_in">input</span>().split())) <span class="hljs-keyword">for</span> _ <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(n)]

<span class="hljs-keyword">for</span> i <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(n):
    <span class="hljs-keyword">for</span> j <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(m):
        <span class="hljs-built_in">print</span>(mat[i][j], end=<span class="hljs-string">&quot; &quot;</span>)
    <span class="hljs-built_in">print</span>()
</code></pre>
<blockquote>
<p>可以從視覺上知道，這兩段程式碼可以分開理解、邏輯獨立。</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="7" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="62">
<h2 id="pep8-%E6%98%AF%E4%BB%80%E9%BA%BC">PEP8 是什麼？</h2>
<ul>
<li>針對 coding style，大方向是希望<strong>程式碼清晰易讀</strong>。</li>
<li>除此之外，某些固定的寫法，能夠<strong>給閱讀者更多資訊，理解這段程式</strong>。</li>
<li>我們要避免大家都有共識很糟的寫法，也要維持一致的<strong>習慣</strong>，<strong>沒有絕對的對錯</strong>，僅是希望同一份專案的程式碼能有<strong>一致的程式風格</strong>。</li>
<li>在一些大型專案中，針對 coding style 會定義自己的<strong>習俗</strong>，一般來說我們要<strong>入境隨俗</strong>。</li>
<li>針對 python 的程式，<strong>python 官方有希望大家遵守的習俗</strong>，<strong>放在 PEP8</strong> 這份提案文件裡面。</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="8" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="62">
<h2 id="pep8-%E6%8E%A8%E8%96%A6%E6%8E%92%E7%89%88-1">PEP8 推薦排版 (1)</h2>
<p>一律使用<strong>四個空格作為縮排</strong>。</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-py"><span class="hljs-keyword">def</span> <span class="hljs-title function_">foo</span>():
    <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;foo&quot;</span>) <span class="hljs-comment"># 4 spacs, good</span>
</code></pre>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-py"><span class="hljs-keyword">def</span> <span class="hljs-title function_">foo</span>():
        <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;foo&quot;</span>) <span class="hljs-comment"># 8 spaces, bad</span>

<span class="hljs-keyword">def</span> <span class="hljs-title function_">foo</span>():
  <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;foo&quot;</span>) <span class="hljs-comment"># 2 spaces, bad</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="9" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="62">
<h2 id="pep8-%E6%8E%A8%E8%96%A6%E6%8E%92%E7%89%88-2">PEP8 推薦排版 (2)</h2>
<p><strong>不</strong>建議將<strong>多行語句寫在同一行</strong>。</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-py"><span class="hljs-keyword">while</span> one == <span class="hljs-number">1</span>: <span class="hljs-comment"># good</span>
    <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;Hello&quot;</span>)
    one = <span class="hljs-number">0</span>
</code></pre>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-py"><span class="hljs-keyword">while</span> one == <span class="hljs-number">1</span>: <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;Hello&quot;</span>); one = <span class="hljs-number">0</span> <span class="hljs-comment"># bad</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="10" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="62">
<h2 id="pep8-%E6%8E%A8%E8%96%A6%E6%8E%92%E7%89%88-3">PEP8 推薦排版 (3)</h2>
<ul>
<li>在 assignment (<code>=</code>)、augmented assignments (<code>+=</code>、<code>-=</code>、<code>*=</code>)、comparisons (<code>&gt;</code>、<code>&lt;</code>、<code>&gt;=</code>、<code>&lt;=</code>、<code>==</code>、<code>is</code>、<code>in</code>)、boolean operations (<code>and</code>、<code>or</code>、<code>not</code>) 的周圍加上空白。</li>
<li>在四則運算的式子中，在優先級最低的運算符周圍加上空白。</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-py">a = <span class="hljs-number">1</span>
b += <span class="hljs-number">1</span>
<span class="hljs-keyword">if</span> b &gt; a <span class="hljs-keyword">and</span> c == <span class="hljs-number">1</span>:
    c = a*b + d
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="11" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="62">
<h2 id="%E8%AE%8A%E6%95%B8%E5%91%BD%E5%90%8D">變數命名</h2>
<p>使用<strong>有意義的變數名稱</strong>，能有效幫助閱讀程式碼的人理解程式。</p>
<p>錯誤示範：</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-py">a = <span class="hljs-string">&quot;Alice&quot;</span>
b = {
    <span class="hljs-string">&quot;Alice&quot;</span>: [<span class="hljs-string">&quot;banana&quot;</span>, <span class="hljs-string">&quot;apple&quot;</span>],
    <span class="hljs-string">&quot;Bob&quot;</span>: [<span class="hljs-string">&quot;juice&quot;</span>]
}
<span class="hljs-built_in">print</span>(b[a])
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="12" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="62">
<p>正確示範：</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-py">username = <span class="hljs-string">&quot;Alice&quot;</span>
shopping_carts = {
    <span class="hljs-string">&quot;Alice&quot;</span>: [<span class="hljs-string">&quot;banana&quot;</span>, <span class="hljs-string">&quot;apple&quot;</span>],
    <span class="hljs-string">&quot;Bob&quot;</span>: [<span class="hljs-string">&quot;juice&quot;</span>]
}
<span class="hljs-built_in">print</span>(shopping_carts[username])
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="13" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="13" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="62">
<h2 id="pep8-%E6%8E%A8%E8%96%A6%E8%AE%8A%E6%95%B8%E5%91%BD%E5%90%8D-1">PEP8 推薦變數命名 (1)</h2>
<ul>
<li>常數(不想變動的固定值)全大寫配合底線。</li>
<li>變數、函數、檔名用底線。</li>
<li>類別名用駝峰。</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-py">MAX_NR_PEOPLE = <span class="hljs-number">4096</span>

current_state = IDLE

rows, cols = <span class="hljs-built_in">map</span>(<span class="hljs-built_in">int</span>, <span class="hljs-built_in">input</span>().split())
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="14" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="14" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="62">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-py"><span class="hljs-keyword">def</span> <span class="hljs-title function_">get_index</span>(<span class="hljs-params">arr: <span class="hljs-built_in">list</span>[<span class="hljs-built_in">int</span>], key: <span class="hljs-built_in">int</span></span>) -&gt; <span class="hljs-built_in">int</span>:
    <span class="hljs-keyword">pass</span>
</code></pre>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-py"><span class="hljs-keyword">class</span> <span class="hljs-title class_">SuperMario</span>:
    <span class="hljs-keyword">def</span> <span class="hljs-title function_">__init__</span>(<span class="hljs-params">self</span>):
        <span class="hljs-keyword">pass</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="15" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="62">
<h2 id="pep8-%E6%8E%A8%E8%96%A6%E8%AE%8A%E6%95%B8%E5%91%BD%E5%90%8D-2">PEP8 推薦變數命名 (2)</h2>
<ul>
<li>避免關鍵字衝突，可以在後面補一個底線。</li>
<li>表示內部函式而非 API，可以在前面補一個底線。</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-py"><span class="hljs-keyword">class</span> <span class="hljs-title class_">Pokemon</span>:
    <span class="hljs-keyword">def</span> <span class="hljs-title function_">__self__</span>(<span class="hljs-params">self, name, type_: <span class="hljs-built_in">str</span>, owner: <span class="hljs-built_in">str</span></span>):
        <span class="hljs-variable language_">self</span>.name = name
        <span class="hljs-variable language_">self</span>.<span class="hljs-built_in">type</span> = type_
        <span class="hljs-variable language_">self</span>._owner = owner
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="16" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="16" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="62">
<h2 id="%E5%85%B6%E4%BB%96%E6%8E%A8%E8%96%A6%E8%AE%8A%E6%95%B8%E5%91%BD%E5%90%8D">其他推薦變數命名</h2>
<p>更具體的命名策略(reference: <a href="https://drive.google.com/file/d/121tBmK85xCnaTj0dmD0PpVSKoIoMbW8W/view?usp=drive_link">前年講師的簡報</a>)：</p>
<ul>
<li>用 <code>is_xxx</code> 來命名布林值/回傳布林值的函式。</li>
<li>用動詞來為 function 命名。</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-py"><span class="hljs-keyword">def</span> <span class="hljs-title function_">is_done</span>() -&gt; <span class="hljs-built_in">bool</span>:
    <span class="hljs-keyword">return</span> done_flag == <span class="hljs-number">1</span>

<span class="hljs-keyword">def</span> <span class="hljs-title function_">get_container</span>(<span class="hljs-params">obj</span>):
    <span class="hljs-keyword">return</span> obj.parent
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="17" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="17" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="62">
<h2 id="%E7%B0%A1%E5%8C%96%E7%A8%8B%E5%BC%8F-1">簡化程式 (1)</h2>
<p>善用 function、class 將程式<strong>模組化</strong>，避免撰寫冗餘的程式。</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-py"><span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;[Error] You should not reach this line&quot;</span>)
<span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;[Error] You accessed private resource&quot;</span>)
</code></pre>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-py"><span class="hljs-keyword">def</span> <span class="hljs-title function_">print_error</span>(<span class="hljs-params">*args, **kargs</span>):
    <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;[Error]&quot;</span>, *args, **kargs)

print_error(<span class="hljs-string">&quot;You should not reach this line&quot;</span>)
print_error(<span class="hljs-string">&quot;You accessed private resource&quot;</span>)
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="18" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="18" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="62">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-py">people_id = [<span class="hljs-number">3</span>, <span class="hljs-number">5</span>, <span class="hljs-number">2</span>]
people_name = [<span class="hljs-string">&quot;Jane&quot;</span>, <span class="hljs-string">&quot;Alice&quot;</span>, <span class="hljs-string">&quot;Kimu&quot;</span>]
</code></pre>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-py"><span class="hljs-keyword">class</span> <span class="hljs-title class_">Person</span>:
    <span class="hljs-keyword">def</span> <span class="hljs-title function_">__init__</span>(<span class="hljs-params">self, id_, name</span>):
        <span class="hljs-variable language_">self</span>.<span class="hljs-built_in">id</span> = id_
        <span class="hljs-variable language_">self</span>.name = name

people = [
    Person(<span class="hljs-number">3</span>, <span class="hljs-string">&quot;Jane&quot;</span>), Person(<span class="hljs-number">5</span>, <span class="hljs-string">&quot;Alice&quot;</span>), Person(<span class="hljs-number">2</span>, <span class="hljs-string">&quot;Kimu&quot;</span>)
]
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="19" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="19" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="62">
<h2 id="%E7%B0%A1%E5%8C%96%E7%A8%8B%E5%BC%8F-2">簡化程式 (2)</h2>
<p>在不符合條件時，採用<strong>提早退出</strong>的策略，以減少不必要的縮排。</p>
<p>不推薦寫法：</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-py"><span class="hljs-keyword">def</span> <span class="hljs-title function_">foo</span>():
    <span class="hljs-keyword">if</span> is_valid():
        <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;foo&quot;</span>)
        x, y = <span class="hljs-number">1</span>, <span class="hljs-number">1</span>
        <span class="hljs-keyword">return</span> <span class="hljs-number">0</span>
    <span class="hljs-keyword">else</span>:
        <span class="hljs-keyword">return</span> <span class="hljs-number">1</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="20" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="20" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="62">
<p>推薦寫法：</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-py"><span class="hljs-keyword">def</span> <span class="hljs-title function_">foo</span>():
    <span class="hljs-keyword">if</span> <span class="hljs-keyword">not</span> is_valid():
        <span class="hljs-keyword">return</span> <span class="hljs-number">1</span>
    <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;foo&quot;</span>)
    x, y = <span class="hljs-number">1</span>, <span class="hljs-number">1</span>
    <span class="hljs-keyword">return</span> <span class="hljs-number">0</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="21" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="21" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="62">
<h2 id="%E7%B0%A1%E5%8C%96%E7%A8%8B%E5%BC%8F-3">簡化程式 (3)</h2>
<p>善用表格來簡化類似的邏輯判斷。</p>
<p>不推薦寫法：</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-py"><span class="hljs-keyword">if</span> month == <span class="hljs-number">1</span>:
    <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;31 days&quot;</span>)
<span class="hljs-keyword">elif</span> month == <span class="hljs-number">2</span>:
    <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;28 days&quot;</span>)
<span class="hljs-keyword">elif</span> month == <span class="hljs-number">3</span>:
    <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;31 days&quot;</span>)
...
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="22" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="22" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="62">
<p>推薦寫法：</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-py">month_to_days = [<span class="hljs-number">0</span>, <span class="hljs-number">31</span>, <span class="hljs-number">28</span>, <span class="hljs-number">31</span>, ...]
<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;<span class="hljs-subst">{month_to_days[month]}</span> days&quot;</span>)
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="23" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="23" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="62">
<p>不推薦寫法：</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-py"><span class="hljs-built_in">print</span>(matrix[y+<span class="hljs-number">1</span>][x])
<span class="hljs-built_in">print</span>(matrix[y][x+<span class="hljs-number">1</span>])
<span class="hljs-built_in">print</span>(matrix[y-<span class="hljs-number">1</span>][x])
<span class="hljs-built_in">print</span>(matrix[y][x-<span class="hljs-number">1</span>])
</code></pre>
<p>推薦寫法：</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-py">dx = [<span class="hljs-number">0</span>, <span class="hljs-number">1</span>, <span class="hljs-number">0</span>, -<span class="hljs-number">1</span>]
dy = [<span class="hljs-number">1</span>, <span class="hljs-number">0</span>, -<span class="hljs-number">1</span>, <span class="hljs-number">0</span>]
<span class="hljs-keyword">for</span> <span class="hljs-built_in">dir</span> <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(<span class="hljs-number">4</span>):
    <span class="hljs-built_in">print</span>(matrix[y+dy[<span class="hljs-built_in">dir</span>]][x+dx[<span class="hljs-built_in">dir</span>]])
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="24" data-paginate="true" data-class="lead" data-theme="custom-academic" lang="en-US" class="lead" data-marpit-pagination="24" style="--paginate:true;--class:lead;--theme:custom-academic;" data-marpit-pagination-total="62">
<h1 id="%E5%96%98%E5%8F%A3%E6%B0%A3">喘口氣~</h1>
<h4 id="%E4%BB%A5%E4%B8%8A%E6%98%AF-coding-style-%E7%9A%84%E9%83%A8%E4%BB%BD">以上是 coding style 的部份</h4>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="25" data-paginate="true" data-class="lead" data-theme="custom-academic" lang="en-US" class="lead" data-marpit-pagination="25" style="--paginate:true;--class:lead;--theme:custom-academic;" data-marpit-pagination-total="62">
<h1 id="error-handling">Error Handling</h1>
<h4 id="%E5%A6%82%E4%BD%95%E5%AF%AB%E5%A5%BD%E7%A9%A9%E7%9A%84%E7%A8%8B%E5%BC%8F">如何寫好穩的程式</h4>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="26" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="26" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="62">
<h2 id="runtime-error-example">Runtime Error Example</h2>
<p>執行以下程式會發生什麼事？</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-py">n = <span class="hljs-number">30</span>
arr = [<span class="hljs-number">1</span>, <span class="hljs-number">2</span>, <span class="hljs-number">3</span>]

<span class="hljs-keyword">for</span> i <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(n):
    <span class="hljs-built_in">print</span>(arr[i], end=<span class="hljs-string">&quot;-&quot;</span>)
</code></pre>
<p>會得到 <code>IndexError: list index out of range</code>。</p>
<blockquote>
<p>我們會說，這支程式有 bug</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="27" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="27" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="62">
<h2 id="implicit-runtime-error-example">&quot;Implicit&quot; Runtime Error Example</h2>
<p>那執行以下程式呢？</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-py">n = <span class="hljs-built_in">int</span>(<span class="hljs-built_in">input</span>())
arr = <span class="hljs-built_in">input</span>().split()

<span class="hljs-keyword">for</span> i <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(n):
    <span class="hljs-built_in">print</span>(arr[i], end=<span class="hljs-string">&quot;-&quot;</span>)
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="28" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="28" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="62">
<p>如果輸入是：</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-log">3
1 2 3
</code></pre>
<p>會得到 <code>1-2-3</code>。</p>
<p>如果輸入是：</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-log">4
1 2 3
</code></pre>
<p>會得到 <code>IndexError: list index out of range</code>。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="29" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="29" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="62">
<h2 id="%E4%BB%80%E9%BA%BC%E6%98%AF-error">什麼是 Error</h2>
<ul>
<li>對於第二個程式，我們<strong>預設使用者輸入的 <code>n</code> 為第二行數字的個數</strong>。</li>
<li>若使用者 不知道/不小心/故意 <strong>沒有遵守這個規則</strong>，則程式會<strong>非預期的崩潰</strong>。</li>
<li>對於這樣的<strong>非預期行為</strong>，我們稱為 <strong>error</strong>。</li>
<li>對於開發中的程式，產生 error 我們可以找到 error 來源，並嘗試解決或選擇忽略。</li>
<li>對於<strong>完整的程式應用</strong>，我們<strong>不希望出現 error</strong>。即使<strong>出現 error</strong>，我們想要<strong>體面的結束程式</strong>，而不是留下一堆爛攤子。</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="30" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="30" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="62">
<h2 id="case-study-cloudflare-outage-2025">Case Study: Cloudflare Outage (2025)</h2>
<ul>
<li>Cloudflare
<ul>
<li>全球網路基礎建設公司。</li>
<li>提供 CDN、網站防禦、防 DDoS 攻擊等服務。</li>
</ul>
</li>
<li>2025/11/18 Cloudflare 崩潰事件
<ul>
<li>起因來自更新的設定檔內容異常，造成沒有做 error handling 的程式崩潰。</li>
<li>造成全球性網路服務下線事件。</li>
<li>包含 ChatGPT、Canva、Spotify 等耳熟能詳的應用，有使用 Cloudflare 服務的應用皆受影響。</li>
</ul>
</li>
</ul>
<blockquote>
<p>事件報告: <a href="https://blog.cloudflare.com/zh-tw/18-november-2025-outage/">https://blog.cloudflare.com/zh-tw/18-november-2025-outage/</a></p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="31" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="31" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="62">
<h2 id="process-crash-example">Process Crash Example</h2>
<p><img src="./images/explorer_crash.png" alt="explorer crash center" style="height:400px;" /></p>
<blockquote>
<p>圖片來源: <a href="https://learn.microsoft.com/en-au/answers/questions/1116917/process-explorer-keeps-on-crashing-with-memory-add">https://learn.microsoft.com/en-au/answers/questions/1116917/process-explorer-keeps-on-crashing-with-memory-add</a></p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="32" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="32" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="62">
<h2 id="windows-bsodblue-screen-of-death">Windows BSOD(Blue Screen of Death)</h2>
<p><img src="./images/windows_bsod.png" alt="Windows BSOD center" style="height:430px;" /></p>
<blockquote>
<p>由 Microsoft - 自己的作品, 公有領域, <a href="https://commons.wikimedia.org/w/index.php?curid=184656745">https://commons.wikimedia.org/w/index.php?curid=184656745</a></p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="33" data-theme="custom-academic" lang="en-US" style="--theme:custom-academic;">
<h2 id="linux-kernel-panic">Linux Kernel Panic</h2>
<p><img src="./images/kernel_panic.png" alt="kernel panic center" style="height:430px;" /></p>
<blockquote>
<p>By Nerdopolis - Own work, CC BY-SA 4.0,<a href="https://commons.wikimedia.org/w/index.php?curid=159322035">https://commons.wikimedia.org/w/index.php?curid=159322035</a></p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="34" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="34" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="62">
<h2 id="%E6%9B%B4%E5%A4%9A-error-%E8%AA%AA%E6%98%8E">更多 Error 說明</h2>
<p>error 指的是，我們<strong>預期程式會進行某些行為</strong>，但這些行為<strong>因某些不可控因素</strong>，<strong>未被滿足</strong>，<strong>引發非預期行為</strong>。</p>
<ul>
<li>輸入未符合格式</li>
<li>記憶體/硬碟空間不足</li>
<li>權限不足</li>
<li>沒有網際網路連線</li>
<li>...</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="35" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="35" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="62">
<h2 id="error-vs-bug">Error vs. Bug</h2>
<p>通常 bug 指的是，<strong>程式邏輯本身有錯</strong>，造成程式於執行時做出<strong>不合法行為或非預期行為</strong>，導致<strong>程式崩潰或表現未如預期</strong>。</p>
<ul>
<li>除以 0</li>
<li>Null Pointer Access</li>
<li>...</li>
</ul>
<p>不用特別區分這兩者，很多時候 <strong>bug 和 error 是一體的</strong>。<br />
我們<strong>不應該讓程式出現 bug</strong>，而針對<strong>潛在的 error</strong>，我們也要<strong>提前防禦</strong>。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="36" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="36" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="62">
<h2 id="%E7%B0%A1%E5%96%AE-error-handling-%E5%81%9A%E6%B3%95">簡單 Error Handling 做法</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-py"><span class="hljs-keyword">import</span> sys

n = <span class="hljs-built_in">int</span>(<span class="hljs-built_in">input</span>())
arr = <span class="hljs-built_in">input</span>().split()

<span class="hljs-keyword">if</span> <span class="hljs-built_in">len</span>(arr) != n:
    <span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;[Error] Expected <span class="hljs-subst">{n}</span> elements, but got <span class="hljs-subst">{<span class="hljs-built_in">len</span>(arr)}</span>.&quot;</span>)
    sys.exit(<span class="hljs-number">1</span>)

<span class="hljs-keyword">for</span> i <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(n):
    <span class="hljs-built_in">print</span>(arr[i], end=<span class="hljs-string">&quot;-&quot;</span>)
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="37" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="37" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="62">
<h2 id="error-handling-in-file-io">Error Handling in File I/O</h2>
<p>在做 File I/O 時，會遇到什麼 error 呢？</p>
<ul>
<li>開啟一個不存在的檔案</li>
<li>有一個同名的資料夾檔案</li>
<li>沒有寫入權限，但嘗試以寫入模式開啟</li>
<li>硬碟空間不足，無法寫入</li>
<li>...</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="38" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="38" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="62">
<h2 id="%E7%82%BA%E4%BB%80%E9%BA%BC%E8%A6%81%E5%AD%B8-error-handling">為什麼要學 Error Handling</h2>
<ul>
<li>在<strong>實務的應用(也就是 2! 會教大家的)中</strong>，我們的程式常常會和<strong>底層系統</strong>、<strong>其他人寫好的程式庫</strong> 打交道。</li>
<li><strong>別人的程式</strong>通常是<strong>提供功能</strong>，而<strong>我們的程式</strong>通常是<strong>使用別人的功能</strong>，完成某項應用任務。</li>
<li>功能的<strong>提供方</strong>，通常會<strong>將內部發生的錯誤</strong>，<strong>回報給功能的使用方</strong>，由使用方自行決定如何處理。</li>
<li>我們要學習，<strong>收到 error 回報的方式</strong>，以及<strong>處理 error 的方法</strong>。</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="39" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="39" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="62">
<h2 id="%E4%B8%8D%E5%90%8C%E7%9A%84-error-%E5%9B%9E%E5%A0%B1%E6%A9%9F%E5%88%B6">不同的 Error 回報機制</h2>
<p>在某些語言的習俗中，功能的提供方，會將 <strong>error 一起放在功能回覆的欄位</strong>，來告訴使用方，這是<strong>成功</strong>還是<strong>發生錯誤</strong>。</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-py"><span class="hljs-keyword">def</span> <span class="hljs-title function_">connect</span>():
    <span class="hljs-string">&quot;&quot;&quot;
    some code to create a connection
    &quot;&quot;&quot;</span>
    <span class="hljs-keyword">if</span> fail:
        <span class="hljs-keyword">return</span> <span class="hljs-literal">None</span>
    <span class="hljs-keyword">return</span> conn
</code></pre>
<blockquote>
<p>在部份 python 套件中，你仍然會看到這種 style 的 error 回傳方式。</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="40" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="40" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="62">
<h2 id="error-handling-model---return-value">Error Handling Model - Return Value</h2>
<ul>
<li>所有人路徑上的 code 都必須意識到這個 error 的存在。</li>
<li>你一定得知道有這個 error 的存在，不然程式默默的用錯的結果繼續執行，造成更災難的後果。</li>
</ul>
<p><img src="./images/error_handling_model_1.png" alt="mode 1 center" style="height:200px;" /></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="41" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="41" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="62">
<h2 id="error-handling-model---exception-channel">Error Handling Model - Exception Channel</h2>
<p>將 error(exception) 放進獨立的訊息通道裡傳遞。</p>
<p><img src="./images/error_handling_model_3.png" alt="model 2 center" style="height:300px;" /></p>
<p>python 是實做這個 model。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="42" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="42" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="62">
<h2 id="error-handling-model---exception-channel-1">Error Handling Model - Exception Channel</h2>
<p>只有想要處理 exception 的人，才需要把它拿起來看，進行處理。</p>
<p><img src="./images/error_handling_model_4.png" alt="model 2 center" style="height:300px;" /></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="43" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="43" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="62">
<h2 id="error-handling-model---exception-channel-2">Error Handling Model - Exception Channel</h2>
<p>如果沒有人處理(包括你的 code)，這個 exception 會一路衝到最頂端，最後導致程式直接崩潰。不會有默默地用錯誤回傳值，執行業務邏輯的情況。</p>
<p><img src="./images/error_handling_model_3.png" alt="model 2 center" style="height:300px;" /></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="44" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="44" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="62">
<h2 id="try--except-%E8%AA%9E%E6%B3%95-1">try / except 語法 (1)</h2>
<p><code>try</code> 建立了會被<strong>監控的範圍</strong>，<code>except</code> 會<strong>接這個範圍內發生的 exception (可指定)</strong>，執行指定程式進行處理。<strong>接起後 exception 就被處理掉了</strong>。</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-py">a, b = <span class="hljs-built_in">map</span>(<span class="hljs-built_in">int</span>, <span class="hljs-built_in">input</span>().split())
<span class="hljs-keyword">try</span>:
    <span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;a/b: <span class="hljs-subst">{a/b}</span>&quot;</span>)
<span class="hljs-keyword">except</span> ZeroDivisionError:
    <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;b should not be 0&quot;</span>)
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="45" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="45" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="62">
<p>沒有 exception 發生：</p>
<ul>
<li>input: <code>1 2</code></li>
<li>output: <code>a/b: 0.5</code></li>
</ul>
<p>除以 0 的 exception 發生：</p>
<ul>
<li>input: <code>1 0</code></li>
<li>output: <code>b should not be 0</code></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="46" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="46" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="62">
<h2 id="%E4%B8%8D%E5%81%9A-error-handling">不做 error handling</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-py">a, b = <span class="hljs-built_in">map</span>(<span class="hljs-built_in">int</span>, <span class="hljs-built_in">input</span>().split())
<span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;a/b: <span class="hljs-subst">{a/b}</span>&quot;</span>)
</code></pre>
<p>沒有 exception 發生：</p>
<ul>
<li>input: <code>1 2</code></li>
<li>output: <code>a/b: 0.5</code></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="47" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="47" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="62">
<p>除以 0 的 exception 發生：</p>
<ul>
<li>input: <code>1 0</code></li>
<li>output: <code>ZeroDivisionError: division by zero</code></li>
</ul>
<p>並且注意到，程式的結束狀態碼不為 0，也就是<strong>程式被標記為異常結束</strong>。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="48" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="48" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="62">
<h2 id="try--except-%E8%AA%9E%E6%B3%95-2">try / except 語法 (2)</h2>
<p>可以 <code>except</code> 多種不同的 exception。</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-py"><span class="hljs-keyword">try</span>:
    x = <span class="hljs-built_in">int</span>(<span class="hljs-built_in">input</span>(<span class="hljs-string">&quot;Enter a number: &quot;</span>))
    result = <span class="hljs-number">10</span> / x
<span class="hljs-keyword">except</span> ZeroDivisionError:
    <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;You cannot divide by zero.&quot;</span>)
<span class="hljs-keyword">except</span> ValueError:
    <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;Invalid input. Please enter a valid number.&quot;</span>)
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="49" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="49" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="62">
<h2 id="try--except-%E8%AA%9E%E6%B3%95-3">try / except 語法 (3)</h2>
<p>一次接起所有 <a href="https://docs.python.org/3/library/exceptions.html#Exception">exception</a> (built-in, non-system-exiting exceptions)。</p>
<p>常見於 server 等應用，在遇到<strong>輕微 exception</strong> 時，單純<strong>留下紀錄</strong>就好。對於<strong>嚴重性高</strong>的(如從外部強行終止程式的事件)，就讓他 <strong>crash</strong> 沒關係。</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-py"><span class="hljs-keyword">try</span>:
    <span class="hljs-keyword">pass</span>
<span class="hljs-keyword">except</span> Exception <span class="hljs-keyword">as</span> e:
    <span class="hljs-built_in">print</span>(e)       <span class="hljs-comment"># error message</span>
    <span class="hljs-built_in">print</span>(<span class="hljs-built_in">type</span>(e)) <span class="hljs-comment"># error type</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="50" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="50" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="62">
<p>舉例：</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-py"><span class="hljs-keyword">try</span>:
    arr = []
    arr[<span class="hljs-number">0</span>] = <span class="hljs-number">1</span>
<span class="hljs-keyword">except</span> Exception <span class="hljs-keyword">as</span> e:
    <span class="hljs-built_in">print</span>(e)       <span class="hljs-comment"># error message</span>
    <span class="hljs-built_in">print</span>(<span class="hljs-built_in">type</span>(e)) <span class="hljs-comment"># error type</span>
</code></pre>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-log">list assignment index out of range
&lt;class 'IndexError'&gt;
</code></pre>
<p>也就是大家常看到的 <code>IndexError: list assignment index out of range</code></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="51" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="51" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="62">
<h2 id="try--except-%E8%AA%9E%E6%B3%95-4">try / except 語法 (4)</h2>
<p>自訂 exception 和自己發起 exception。在套件 source code 裡會看到。</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-py"><span class="hljs-keyword">class</span> <span class="hljs-title class_">MyError</span>(<span class="hljs-title class_ inherited__">Exception</span>):
    <span class="hljs-keyword">pass</span>

<span class="hljs-keyword">try</span>:
    <span class="hljs-keyword">raise</span> MyError(<span class="hljs-string">&quot;HaHa&quot;</span>)
<span class="hljs-keyword">except</span> MyError <span class="hljs-keyword">as</span> e:
    <span class="hljs-built_in">print</span>(e)       <span class="hljs-comment"># HaHa</span>
    <span class="hljs-built_in">print</span>(<span class="hljs-built_in">type</span>(e)) <span class="hljs-comment"># &lt;class &#x27;__main__.MyError&#x27;&gt;</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="52" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="52" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="62">
<h2 id="try--except--else-%E8%AA%9E%E6%B3%95">try / except / else 語法</h2>
<p>如果<strong>沒有任何 exception 被接起來</strong>，則會<strong>執行 <code>else</code> block</strong> 的內容。</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-py"><span class="hljs-keyword">def</span> <span class="hljs-title function_">foo</span>(<span class="hljs-params">a, b</span>):
    <span class="hljs-keyword">try</span>:
        c = a / b
    <span class="hljs-keyword">except</span> ZeroDivisionError:
        <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;b should not be zero&quot;</span>)
    <span class="hljs-keyword">else</span>:
        <span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;a/b: <span class="hljs-subst">{c}</span>&quot;</span>)

foo(<span class="hljs-number">1</span>, <span class="hljs-number">2</span>) <span class="hljs-comment"># a/b: 0.5</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="53" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="53" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="62">
<h2 id="try--except--finally-%E8%AA%9E%E6%B3%95">try / except / finally 語法</h2>
<p>強力的<strong>善後語法</strong>，只要<strong>進入了 <code>try</code> block</strong>，在<strong>離開前一定會執行 <code>finally</code> 的 block</strong>，無論如何！</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-py"><span class="hljs-keyword">def</span> <span class="hljs-title function_">foo</span>():
    <span class="hljs-keyword">try</span>:
        a = <span class="hljs-number">1</span> / <span class="hljs-number">0</span>
    <span class="hljs-keyword">except</span> ZeroDivisionError:
        <span class="hljs-keyword">return</span>
    <span class="hljs-keyword">finally</span>:
        <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;called&quot;</span>)
foo()
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="54" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="54" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="62">
<h2 id="try--except--else--finally-%E5%9F%B7%E8%A1%8C%E9%A0%86%E5%BA%8F">try / except / else / finally 執行順序</h2>
<p><img src="./images/try_except_else_finally_order.png" alt="teef_order center" style="height:460px;" /></p>
<blockquote>
<p>圖片來源: <a href="https://realpython.com/python-exceptions/">https://realpython.com/python-exceptions/</a></p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="55" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="55" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="62">
<h2 id="case-study-rich">Case Study: <a href="https://github.com/textualize/rich">rich</a></h2>
<p>一個可以讓 terminal 輸出看起來超酷的工具！</p>
<p><code>rich/rich/__init__.py</code>:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-py"><span class="hljs-keyword">try</span>:
    _IMPORT_CWD = os.path.abspath(os.getcwd())
<span class="hljs-keyword">except</span> FileNotFoundError:
    <span class="hljs-comment"># Can happen if the cwd has been deleted</span>
    _IMPORT_CWD = <span class="hljs-string">&quot;&quot;</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="56" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="56" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="62">
<h2 id="case-study-maloneys-music-player">Case Study: <a href="https://john.maloney.org/Programming/pythonmusic.htm">Maloney's Music Player</a></h2>
<p>用 Raspberry Pi、觸碰感測器、音響作為硬體，寫了一個 python script，製作碰到歌手相片會播放音樂的應用。</p>
<p><img src="./images/DFWB_raspberry_pi.jpg" alt="rbp center" style="height:350px;" /></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="57" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="57" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="62">
<p>code (疑似是 python 2):</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-py"><span class="hljs-keyword">try</span>:
    <span class="hljs-keyword">import</span> RPi.GPIO <span class="hljs-keyword">as</span> GPIO
    <span class="hljs-keyword">import</span> os, time
    GPIO.setmode(GPIO.BOARD)
    ...
<span class="hljs-keyword">except</span> KeyboardInterrupt:
        os.system(<span class="hljs-string">&#x27;mpc -q stop&#x27;</span>)
        os.system(<span class="hljs-string">&#x27;mpc -q volume 100&#x27;</span>)
        <span class="hljs-built_in">print</span> <span class="hljs-string">&quot;Program terminated.&quot;</span>
<span class="hljs-keyword">finally</span>:
        GPIO.cleanup()
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="58" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="58" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="62">
<h2 id="case-study-pooiscodings-judge-script">Case Study: pooiscoding's Judge Script</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-py"><span class="hljs-keyword">try</span>:
    <span class="hljs-keyword">for</span> i <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(NR_SUBSCRIBERS):
        subscribers[i] = run_command(...)
        <span class="hljs-keyword">if</span> <span class="hljs-keyword">not</span> wait_for_output(...):
            kill_all_procs()
            sys.exit(JUDGE_WA)
    ...
    kill_all_procs()
<span class="hljs-keyword">except</span> Exception <span class="hljs-keyword">as</span> e:
    kill_all_procs()
    sys.exit(JUDGE_FATAL)
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="59" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="59" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="62">
<h2 id="refactor-using-finally">Refactor Using <code>finally</code></h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-py"><span class="hljs-keyword">try</span>:
    <span class="hljs-keyword">for</span> i <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(NR_SUBSCRIBERS):
        subscribers[i] = run_command(...)
        <span class="hljs-keyword">if</span> <span class="hljs-keyword">not</span> wait_for_output(...):
            sys.exit(JUDGE_WA)
    ...
<span class="hljs-keyword">except</span> Exception <span class="hljs-keyword">as</span> e:
    sys.exit(JUDGE_FATAL)
<span class="hljs-keyword">finally</span>:
    kill_all_procs()
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="60" data-paginate="true" data-theme="custom-academic" lang="en-US" data-marpit-pagination="60" style="--paginate:true;--theme:custom-academic;" data-marpit-pagination-total="62">
<h2 id="takeaways">Takeaways</h2>
<ul>
<li>Coding Style
<ul>
<li><strong>良好的 coding style</strong> (排版、命名) 可以大幅<strong>提升程式可讀性</strong>。</li>
<li>跟著簡報的內容做，<strong>練習撰寫專業、簡潔、美觀的 python 程式碼</strong>。</li>
</ul>
</li>
<li>Error Handling
<ul>
<li>理解 <strong>error handling 的重要性</strong>，與和 <strong>2! 課程的關聯性</strong>。</li>
<li>理解 <strong>return value model</strong> 和 <strong>exception model</strong> 的區別。</li>
<li>python 的 <strong><code>try / except / else / finally</code> 語法</strong>。</li>
<li><code>try / except</code> 的<strong>實務使用情境</strong>。</li>
</ul>
</li>
</ul>
</section>
